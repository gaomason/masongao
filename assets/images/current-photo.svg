<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="675"
  viewBox="0 0 1200 675"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Current photo placeholder</title>
  <desc id="desc">Placeholder image for Mason Gao's current photo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3f6fb" />
      <stop offset="100%" stop-color="#e2e8f5" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" />
  <rect
    x="250"
    y="110"
    width="700"
    height="455"
    rx="20"
    fill="#ffffff"
    stroke="#b7c4db"
    stroke-width="3"
  />
  <circle cx="600" cy="270" r="70" fill="#d7e1f0" />
  <path
    d="M360 500c45-95 145-145 240-145s195 50 240 145"
    fill="none"
    stroke="#d7e1f0"
    stroke-width="28"
    stroke-linecap="round"
  />
  <text
    x="600"
    y="605"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="34"
    text-anchor="middle"
    fill="#4b5c77"
  >
    Replace with current photo
  </text>
</svg>
