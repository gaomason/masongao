name: Build content

on:
  push:
    branches:
      - master
    paths:
      - content/**
      - scripts/**
      - package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build content
        run: npm run build

      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/
          if git diff --staged --quiet; then
            echo "Generated content is already up to date."
          else
            git commit -m "chore: rebuild content from markdown"
            git push
          fi
