<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal | Mason Gao</title>
    <meta name="description" content="Personal page for Mason Gao." />
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-row">
        <a class="brand" href="../">Mason Gao</a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="../">Home</a>
          <a href="../professional/">Professional / Research</a>
          <a class="active" href="./">Personal</a>
        </nav>
      </div>
    </header>

    <main class="container page-content">
      <section class="section">
        <h1>Personal</h1>
        <p>
        A glimpse into my life.
        </p>
      </section>

      <section class="section card">
        <h2>What I'm listening to (Last updated May 25, 2026)</h2>
        <div class="spotify-wrap">
          <iframe
            src="https://open.spotify.com/embed/track/37eqNgyhBtTAYPLwpPEXcA?si=39d402baac07447e"
            width="100%"
            height="152"
            frameborder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
            title="Current favorite song on Spotify"
          ></iframe>
        </div>

        <h3 class="music-subhead">Recent </h3>
        <div class="music-history-grid">
          <article class="music-history-item">
            <p class="music-entry-date">May 20, 2026</p>
            <div class="spotify-wrap spotify-wrap-small">
              <iframe
                src="https://open.spotify.com/embed/track/4cQIve5Heuo98gudSCPBCL?si=fec1775d1428491c"
                width="100%"
                height="100%"
                frameborder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                title="Recent track one on Spotify"
              ></iframe>
            </div>
          </article>
          <article class="music-history-item">
            <p class="music-entry-date">May 16, 2026</p>
            <div class="spotify-wrap spotify-wrap-small">
              <iframe
                src="https://open.spotify.com/embed/track/2StAeGaKy1gBOllUoAjqxV?si=c299c73538f84e5c"
                width="100%"
                height="100%"
                frameborder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                title="Recent track two on Spotify"
              ></iframe>
            </div>
          </article>
          <article class="music-history-item">
            <p class="music-entry-date">May 13, 2026</p>
            <div class="spotify-wrap spotify-wrap-small">
              <iframe
                src="https://open.spotify.com/embed/track/4XrWar13kLO1jr535AzKrQ?si=60ed9d8966fc4231"
                width="100%"
                height="100%"
                frameborder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                title="Recent track three on Spotify"
              ></iframe>
            </div>
          </article>
          <article class="music-history-item">
            <p class="music-entry-date">Apr 30, 2026</p>
            <div class="spotify-wrap spotify-wrap-small">
              <iframe
                src="https://open.spotify.com/embed/track/44xvVW7qnHLMCRdEo5LgZa?si=e0187b098574494a"
                width="100%"
                height="100%"
                frameborder="0"
                allowfullscreen=""
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                loading="lazy"
                title="Recent track four on Spotify"
              ></iframe>
            </div>
          </article>
        </div>

        <h3 class="music-subhead">
          <button
            id="more-songs-toggle"
            class="music-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="more-songs-playlist"
          >
            More songs
          </button>
        </h3>
        <div id="more-songs-playlist" class="spotify-wrap spotify-wrap-playlist" hidden>
          <iframe
            src="https://open.spotify.com/embed/playlist/2pxHZhlh8ywOaadtOxT7f4?si=d2f5041cbbf841a7"
            width="100%"
            height="352"
            frameborder="0"
            allowfullscreen=""
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
            loading="lazy"
            title="Spotify playlist"
          ></iframe>
        </div>
      </section>

      <section class="section card">
        <div class="section-head">
          <h2>Picture of the day/week/month/year</h2>
          <a class="section-head-link" href="photos-archive.html">View more</a>
        </div>
        <img
          class="feature-image current-photo-image"
          src="../assets/images/Dog.jpg"
          alt="Panda, current photo"
        />
        <p class="photo-caption">
          Panda. 5/25/2026
        </p>
      </section>

      <section class="section card">
        <div class="section-head">
          <h2>Log</h2>
          <a class="section-head-link" href="posts.html">View more</a>
        </div>
        <ul id="recent-posts" class="post-list"></ul>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> Mason Gao</p>
      </div>
    </footer>

    <script src="../assets/js/posts.js"></script>
    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
      renderRecentPosts("recent-posts", 5);
      const moreSongsToggle = document.getElementById("more-songs-toggle");
      const moreSongsPlaylist = document.getElementById("more-songs-playlist");

      moreSongsToggle.addEventListener("click", () => {
        const isExpanded = moreSongsToggle.getAttribute("aria-expanded") === "true";
        moreSongsToggle.setAttribute("aria-expanded", String(!isExpanded));
        moreSongsPlaylist.hidden = isExpanded;
      });
    </script>
  </body>
</html>
